spring:
  application:
    name: tp-cost-api

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/tcc_insumos}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1
    validate-on-migrate: false

server:
  port: ${PORT:8080}
  
logging:
  level:
    com.transformador: INFO
    org.springframework.web: INFO
